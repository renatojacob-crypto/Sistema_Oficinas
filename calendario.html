<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Oficinas</title>
    <link rel="stylesheet" href="style.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        #calendar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .fc-event { cursor: pointer; border: none; padding: 2px 4px; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 1000px;">
        <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-weight: 600;">← Voltar ao Início</a>
        
        <header class="form-header" style="margin-top: 15px;">
            <h1>Calendário de Agendamentos</h1>
        </header>

        <div id="status" class="loading">Carregando calendário...</div>
        <div id="calendar" style="display:none;"></div>
    </div>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbxCEsmkvWPrKx7T27YebP5TMaYGAf63qTLR_spF3t7lp5tZLvVBqf0DxKyhRJAEMmZqpA/exec"; 
        
        // Paleta de cores para as oficinas
        const cores = ['#0056b3', '#28a745', '#dc3545', '#ffc107', '#17a2b8', '#6f42c1', '#fd7e14', '#20c997'];
        let corMapa = {};
        let corIndex = 0;

        window.onload = () => {
            fetch(URL_GAS)
                .then(res => res.json())
                .then(data => {
                    const eventosCalendario = data.agendaCompleta.map(ag => {
                        // Atribui uma cor fixa por nome de oficina
                        if(!corMapa[ag.oficina]) {
                            corMapa[ag.oficina] = cores[corIndex % cores.length];
                            corIndex++;
                        }
                        
                        // Lida com oficinas canceladas (deixa cinza)
                        let eventColor = ag.status === "Cancelada" ? "#9ca3af" : corMapa[ag.oficina];

                        // Formata Data e Hora para o calendário
                        // Se houver hora de início, cria evento com hora. Se não, evento de dia inteiro.
                        let startFormat = ag.inicio ? `${ag.data}T${ag.inicio}:00` : ag.data;
                        let endFormat = ag.fim ? `${ag.data}T${ag.fim}:00` : ag.data;

                        return {
                            title: (ag.status === "Cancelada" ? "[CANCELADA] " : "") + ag.title,
                            start: startFormat,
                            end: endFormat,
                            color: eventColor,
                            description: `Oficina: ${ag.oficina}\nStatus: ${ag.status || "Agendado"}`
                        };
                    });

                    renderizarCalendario(eventosCalendario);
                })
                .catch(err => {
                    document.getElementById("status").innerText = "Erro ao carregar os dados.";
                    document.getElementById("status").style.color = "red";
                });
        };

        function renderizarCalendario(eventos) {
            document.getElementById("status").style.display = "none";
            const calendarEl = document.getElementById('calendar');
            calendarEl.style.display = "block";

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: eventos,
                eventClick: function(info) {
                    alert(info.event.extendedProps.description + "\nHorário: " + info.event.start.toLocaleString());
                }
            });
            calendar.render();
        }
    </script>
</body>
</html>
