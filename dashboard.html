<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Resultados</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container { max-width: 1000px; margin: auto; padding: 20px; }
        .filter-bar { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .filter-item { flex: 1; min-width: 200px; }
        .kpi-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { flex: 1; background: var(--primary-color); color: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kpi-value { font-size: 36px; font-weight: bold; margin-top: 10px; }
        .chart-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-card { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <a href="index.html" style="text-decoration: none; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px;">← Voltar ao Início</a>
        
        <h1 style="color: var(--primary-color); margin-top: 20px; background: white; padding: 15px; border-radius: 8px;">📊 Dashboard de Resultados</h1>

        <div id="status" class="loading" style="background: white;">Carregando dados estatísticos...</div>

        <div id="dashboardContent" style="display:none;">
            <div class="filter-bar">
                <div class="filter-item">
                    <label>Data Inicial:</label>
                    <input type="date" id="filtroInicio">
                </div>
                <div class="filter-item">
                    <label>Data Final:</label>
                    <input type="date" id="filtroFim">
                </div>
                <div class="filter-item">
                    <label>Oficina:</label>
                    <select id="filtroOficina">
                        <option value="Todas">Todas as Oficinas</option>
                    </select>
                </div>
                <div class="filter-item" style="flex: 0.5;">
                    <button onclick="aplicarFiltros()" style="margin-top:0; padding: 12px;">Filtrar</button>
                </div>
            </div>

            <div class="kpi-row">
                <div class="kpi-card">
                    <div>Total de Oficinas Realizadas</div>
                    <div class="kpi-value" id="kpiOficinas">0</div>
                </div>
                <div class="kpi-card" style="background: #28a745;">
                    <div>Total de Alunos Impactados</div>
                    <div class="kpi-value" id="kpiAlunos">0</div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <canvas id="graficoLocal"></canvas>
                </div>
                <div class="chart-card">
                    <canvas id="graficoOficina"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycby7xToVGPKHlYnTn7YP3SMPdbkFjJWKD54713KvqRSvoKJGj1C42w9ymwxzqOIPX2O6BQ/exec"; 
        
        let dadosBrutos = [];
        let chartLocal = null;
        let chartOficina = null;

        window.onload = () => {
            fetch(URL_GAS)
                .then(res => res.json())
                .then(data => {
                    dadosBrutos = data.realizadas;
                    
                    // Preenche o filtro de Oficinas
                    const selectOficina = document.getElementById("filtroOficina");
                    data.oficinas.forEach(oficina => {
                        selectOficina.innerHTML += `<option value="${oficina}">${oficina}</option>`;
                    });

                    document.getElementById("status").style.display = "none";
                    document.getElementById("dashboardContent").style.display = "block";
                    
                    aplicarFiltros(); // Desenha os gráficos inicialmente com todos os dados
                });
        };

        function aplicarFiltros() {
            const dataInicio = document.getElementById("filtroInicio").value;
            const dataFim = document.getElementById("filtroFim").value;
            const oficinaEscolhida = document.getElementById("filtroOficina").value;

            // Filtra o array de dados brutos
            const dadosFiltrados = dadosBrutos.filter(item => {
                let passaDataInicio = !dataInicio || item.data >= dataInicio;
                let passaDataFim = !dataFim || item.data <= dataFim;
                let passaOficina = oficinaEscolhida === "Todas" || item.oficina === oficinaEscolhida;
                
                return passaDataInicio && passaDataFim && passaOficina;
            });

            atualizarDashboard(dadosFiltrados);
        }

        function atualizarDashboard(dados) {
            // Atualiza KPIs
            document.getElementById("kpiOficinas").innerText = dados.length;
            const totalAlunos = dados.reduce((sum, item) => sum + item.alunos, 0);
            document.getElementById("kpiAlunos").innerText = totalAlunos;

            // Agrupa dados para os gráficos
            const contagemPorLocal = {};
            const contagemPorOficina = {};

            dados.forEach(item => {
                contagemPorLocal[item.local] = (contagemPorLocal[item.local] || 0) + 1;
                contagemPorOficina[item.oficina] = (contagemPorOficina[item.oficina] || 0) + item.alunos;
            });

            // Destroi gráficos antigos se existirem (para não sobrepor)
            if(chartLocal) chartLocal.destroy();
            if(chartOficina) chartOficina.destroy();

            // Gráfico 1: Oficinas por Regional (Barras)
            const ctxLocal = document.getElementById('graficoLocal').getContext('2d');
            chartLocal = new Chart(ctxLocal, {
                type: 'bar',
                data: {
                    labels: Object.keys(contagemPorLocal),
                    datasets: [{
                        label: 'Qtd. de Oficinas Realizadas',
                        data: Object.values(contagemPorLocal),
                        backgroundColor: '#0056b3'
                    }]
                },
                options: { plugins: { title: { display: true, text: 'Oficinas por Regional' } } }
            });

            // Gráfico 2: Alunos por Oficina (Rosca)
            const ctxOficina = document.getElementById('graficoOficina').getContext('2d');
            chartOficina = new Chart(ctxOficina, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(contagemPorOficina),
                    datasets: [{
                        data: Object.values(contagemPorOficina),
                        backgroundColor: ['#0056b3', '#28a745', '#ffc107', '#dc3545', '#17a2b8', '#6f42c1']
                    }]
                },
                options: { plugins: { title: { display: true, text: 'Total de Alunos por Tipo de Oficina' } } }
            });
        }
    </script>
</body>
</html>
