<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Oficinas</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        label, input, select { display: block; width: 100%; margin-bottom: 15px; }
        button { padding: 10px 15px; background: #0056b3; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<h2>Registro de Oficina</h2>
<form id="oficinaForm">
    
    <label>Data da Oficina:</label>
    <input type="date" id="dataDaOficina" required>

    <label>Qual o local da Oficina?</label>
    <select id="local" onchange="atualizarDependentes()" required>
        <option value="">Selecione...</option>
        <option value="Local A">Local A</option>
        <option value="Local B">Local B</option>
        </select>

    <label>Cidade da Oficina?</label>
    <input type="text" id="cidade" readonly placeholder="Preenchimento automático">

    <label>Selecionar os Instrutores Presentes:</label>
    <select id="instrutores" required>
        <option value="">Aguardando seleção do local...</option>
    </select>

    <label>Nome da Instituição de Ensino:</label>
    <input list="instituicoesLista" id="instituicao" autocomplete="off" required>
    <datalist id="instituicoesLista">
        <option value="Escola Acalento">
        <option value="Escola UNIF-CE">
        <option value="Colégio Coedudar">
    </datalist>

    <label>Quantidade de Alunos:</label>
    <input type="number" id="alunos" required>

    <label>Fotos (Máximo de 10):</label>
    <input type="file" id="fotos" multiple accept="image/*" onchange="validarFotos(this)">

    <button type="submit">Enviar Formulário</button>
</form>

<script>
    const API_URL = "SUA_URL_DO_WEB_APP_AQUI"; // Cole a URL gerada no Passo 2
    let base64Files = [];

    // Função para validar limite de 10 fotos e converter para Base64
    function validarFotos(input) {
        if (input.files.length > 10) {
            alert("Por favor, selecione no máximo 10 fotos.");
            input.value = "";
            return;
        }
        
        base64Files = [];
        Array.from(input.files).forEach(file => {
            let reader = new FileReader();
            reader.onload = function(e) {
                base64Files.push({
                    name: file.name,
                    mimeType: file.type,
                    base64: e.target.result.split(',')[1] // Remove o cabeçalho do data URL
                });
            };
            reader.readAsDataURL(file);
        });
    }

    // Lógica para preencher Cidade e Instrutor baseado no Local
    function atualizarDependentes() {
        const local = document.getElementById("local").value;
        const cidadeInput = document.getElementById("cidade");
        const instrutoresSelect = document.getElementById("instrutores");
        
        // Exemplo simplificado. Na prática, você buscaria isso da variável carregada do GAS
        if(local === "Local A") {
            cidadeInput.value = "São Luís-MA";
            instrutoresSelect.innerHTML = "<option value='Instrutor 1'>Instrutor 1</option>";
        } else {
            cidadeInput.value = "";
            instrutoresSelect.innerHTML = "<option value=''>Aguardando...</option>";
        }
    }

    document.getElementById("oficinaForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const payload = {
            dataDaOficina: document.getElementById("dataDaOficina").value,
            local: document.getElementById("local").value,
            cidade: document.getElementById("cidade").value,
            instrutores: document.getElementById("instrutores").value,
            instituicao: document.getElementById("instituicao").value,
            alunos: document.getElementById("alunos").value,
            // ... adicione os outros campos mapeados
            fotos: base64Files
        };

        // Enviar para o Google Apps Script
        // Usamos text/plain para evitar o disparo de preflight (CORS) restrito pelo Google
        fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === "success"){
                alert("Oficina registrada com sucesso!");
                document.getElementById("oficinaForm").reset();
                base64Files = [];
            }
        }).catch(err => console.error("Erro:", err));
    });
</script>
</body>
</html>
