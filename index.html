<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Oficinas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; line-height: 1.5; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        select, input[type="text"], input[type="number"], input[type="date"], input[list] { 
            width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .checkbox-group {
            border: 1px solid #ccc; padding: 10px; border-radius: 4px; max-height: 150px; overflow-y: auto; background: #fff; margin-bottom: 10px;
        }
        .checkbox-label {
            font-weight: normal; display: flex; align-items: center; gap: 8px; margin-top: 5px; cursor: pointer;
        }
        button { background: #28a745; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 4px; margin-top: 15px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { color: #0056b3; font-weight: bold; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Registro de Oficina</h2>
    <div id="status" class="loading">Carregando dados da planilha... aguarde.</div>

    <form id="formOficina" style="display:none;">
        <label>Data da Oficina:</label>
        <input type="date" id="dataOficina" required>

        <label>Qual o local da Oficina?</label>
        <select id="local" onchange="filtrarCidadeEInstrutores()" required></select>

        <label>Cidade da Oficina:</label>
        <select id="cidade" required>
            <option value="">Selecione o local primeiro...</option>
        </select>

        <label>Qual a oficina realizada?</label>
        <select id="oficina" required></select>

        <label>Turno da Oficina:</label>
        <select id="turno" required></select>

        <label>Nome da Instituição de Ensino:</label>
        <input list="listaInstituicoes" id="instituicao" autocomplete="off" placeholder="Digite ou selecione..." required>
        <datalist id="listaInstituicoes"></datalist>

        <label>Ano e Turma dos Alunos:</label>
        <select id="turma" required></select>

        <label>Segmento Educacional:</label>
        <select id="segmento" required></select>

        <label>Número de Prof/Coord Acompanhantes:</label>
        <input type="number" id="acompanhantes" min="0" placeholder="Ex: 2" required>

        <label>Selecionar os Instrutores Presentes:</label>
        <div id="instrutoresContainer" class="checkbox-group">
            <i>Selecione o local primeiro...</i>
        </div>

        <label>Quantidade de Alunos:</label>
        <input type="number" id="alunos" min="1" required>

        <label>Fotos (Máximo 10):</label>
        <input type="file" id="fotos" multiple accept="image/*" onchange="converterFotos(this)">

        <button type="submit" id="btnEnviar">Enviar Formulário</button>
    </form>

    <script>
        // COLOQUE AQUI A SUA URL DO GOOGLE APPS SCRIPT
        const URL_GAS = "https://script.google.com/macros/s/AKfycbzkvJqfTXRwOcJVO63UUbTkcTjbpAY3rvdSSsdDNbFqsBjmgzun7P1-wVVt9CkAD6cpWw/exec"; 
        
        let dadosGlobais = {};
        let fotosBase64 = [];

        window.onload = () => {
            fetch(URL_GAS)
                .then(res => res.json())
                .then(data => {
                    dadosGlobais = data;
                    
                    const locaisUnicos = [...new Set(data.locais.map(r => r[1]))];
                    popularSelect("local", locaisUnicos);
                    
                    popularSelect("oficina", data.oficinas);
                    popularSelect("turno", data.turnos);
                    popularSelect("turma", data.turmas);
                    popularSelect("segmento", data.segmentos);
                    
                    const datalist = document.getElementById("listaInstituicoes");
                    if(data.instituicoes) {
                        [...new Set(data.instituicoes)].forEach(inst => {
                            datalist.innerHTML += `<option value="${inst}">`;
                        });
                    }

                    document.getElementById("status").style.display = "none";
                    document.getElementById("formOficina").style.display = "block";
                })
                .catch(err => {
                    console.error("Erro ao carregar dados:", err);
                    document.getElementById("status").innerText = "Erro ao carregar os dados. Verifique a URL do Script.";
                    document.getElementById("status").style.color = "red";
                });
        };

        function popularSelect(id, array) {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Selecione...</option>';
            array.forEach(item => {
                select.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }

        function filtrarCidadeEInstrutores() {
            const localSelecionado = document.getElementById("local").value;
            
            // FILTRAR CIDADES
            const cidadesFiltradas = dadosGlobais.locais
                .filter(r => r[1] === localSelecionado)
                .map(r => r[2]);
            popularSelect("cidade", cidadesFiltradas);

            // FILTRAR INSTRUTORES (AGORA COM CHECKBOXES)
            const instrutoresContainer = document.getElementById("instrutoresContainer");
            instrutoresContainer.innerHTML = ""; // Limpa a lista atual
            
            const instrutoresFiltrados = dadosGlobais.instrutoresData
                .filter(r => {
                    const regionalDoInstrutor = r[3] || "";
                    return regionalDoInstrutor === localSelecionado || 
                          (localSelecionado.includes("Governador") && regionalDoInstrutor.includes("Gov."));
                })
                .map(r => r[1]);
                
            if (instrutoresFiltrados.length === 0) {
                instrutoresContainer.innerHTML = "<i>Nenhum instrutor encontrado.</i>";
            } else {
                instrutoresFiltrados.forEach(instrutor => {
                    const label = document.createElement("label");
                    label.className = "checkbox-label";
                    label.innerHTML = `<input type="checkbox" name="instrutorCheck" value="${instrutor}"> ${instrutor}`;
                    instrutoresContainer.appendChild(label);
                });
            }
        }

        function converterFotos(input) {
            fotosBase64 = [];
            if (input.files.length > 10) { alert("Máximo 10 fotos permitidas!"); input.value = ""; return; }
            
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotosBase64.push({
                        name: file.name,
                        mimeType: file.type,
                        base64: e.target.result.split(',')[1]
                    });
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById("formOficina").onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnEnviar");

            // Validação dos instrutores (garantir que pelo menos um foi marcado)
            const checkboxes = document.querySelectorAll('input[name="instrutorCheck"]:checked');
            if (checkboxes.length === 0) {
                alert("Por favor, selecione pelo menos um instrutor presente.");
                return; // Impede o envio se nenhum estiver marcado
            }
            
            // Transforma os selecionados em um texto separado por vírgula (Ex: "Iago, Ingrid, Liliane")
            const instrutoresSelecionados = Array.from(checkboxes).map(cb => cb.value).join(", ");

            btn.innerText = "Salvando na planilha e no Drive...";
            btn.disabled = true;

            const payload = {
                dataDaOficina: document.getElementById("dataOficina").value,
                local: document.getElementById("local").value,
                cidade: document.getElementById("cidade").value,
                oficina: document.getElementById("oficina").value,
                turno: document.getElementById("turno").value,
                instituicao: document.getElementById("instituicao").value,
                turma: document.getElementById("turma").value,
                segmento: document.getElementById("segmento").value,
                acompanhantes: document.getElementById("acompanhantes").value, // Agora puxa o número digitado
                instrutores: instrutoresSelecionados, // Envia a string com os nomes marcados
                alunos: document.getElementById("alunos").value,
                fotos: fotosBase64
            };

            fetch(URL_GAS, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    alert("Dados e fotos salvos com sucesso!");
                    location.reload(); 
                } else {
                    alert("Erro ao salvar: " + res.message);
                    btn.innerText = "Enviar Formulário";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Erro de conexão ao salvar.");
                console.error(err);
                btn.innerText = "Enviar Formulário";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
