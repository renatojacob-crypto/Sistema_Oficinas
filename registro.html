<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Oficinas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .readonly-field { background-color: #e5e7eb !important; color: #4b5563 !important; font-weight: 500; }
        .hidden { display: none; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); background: #f9fafb;}
        .radio-group { display: flex; gap: 20px; margin-top: 10px; }
        .radio-group label { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; cursor: pointer;}
        .radio-group input { width: 20px; height: 20px; accent-color: var(--primary-color);}
    </style>
</head>
<body>

    <div class="container">
        <header class="form-header">
            <img src="imagens/logopreto.png" alt="Logomarca da Empresa" class="logo-empresa">
            <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-size: 14px; font-weight: 600;">← Voltar ao Início</a>
            <h1>Registro<br>de Oficina</h1>
        </header>

        <div id="status" class="loading">Sincronizando agendamentos pendentes...</div>

        <form id="formOficina" style="display:none;">
            
            <div class="form-group">
                <label for="agendamentoSelect" style="color: var(--primary-color); font-size: 16px;">1. Selecione a Oficina Agendada:</label>
                <select id="agendamentoSelect" onchange="preencherDadosAgendamento()" required>
                    <option value="">Aguardando seleção...</option>
                </select>
            </div>

            <div id="dadosBase" class="hidden">
                <div class="form-group">
                    <label>Data da Oficina:</label>
                    <input type="date" id="dataOficina" class="readonly-field" readonly>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Regional:</label>
                        <input type="text" id="local" class="readonly-field" readonly>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Cidade:</label>
                        <input type="text" id="cidade" class="readonly-field" readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label>Oficina Realizada:</label>
                    <input type="text" id="oficina" class="readonly-field" readonly>
                </div>
                <div class="form-group">
                    <label>Instituição de Ensino:</label>
                    <input type="text" id="instituicao" class="readonly-field" readonly>
                </div>

                <div class="status-box">
                    <label style="font-size: 16px; color: var(--primary-color);">2. Qual o Status da Oficina?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="statusOficina" value="Realizada" onchange="alternarStatus()" required> Realizada</label>
                        <label><input type="radio" name="statusOficina" value="Cancelada" onchange="alternarStatus()"> Cancelada</label>
                    </div>
                </div>
            </div>

            <div id="blocoCancelada" class="hidden">
                <div class="form-group">
                    <label for="motivoCancelamento">Motivo do Cancelamento:</label>
                    <textarea id="motivoCancelamento" rows="4" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit;"></textarea>
                </div>
            </div>

            <div id="blocoRealizada" class="hidden">
                <div class="form-group">
                    <label for="turno">Turno da Oficina:</label>
                    <select id="turno"></select>
                </div>
                <div class="form-group">
                    <label for="turma">Ano e Turma dos Alunos:</label>
                    <select id="turma"></select>
                </div>
                <div class="form-group">
                    <label for="segmento">Segmento Educacional:</label>
                    <select id="segmento"></select>
                </div>
                <div class="form-group">
                    <label for="acompanhantes">Número de Prof/Coord Acompanhantes:</label>
                    <input type="number" id="acompanhantes" min="0" placeholder="Ex: 2">
                </div>
                <div class="form-group">
                    <label>Selecionar os Instrutores Presentes:</label>
                    <div id="instrutoresContainer" class="checkbox-group"></div>
                </div>
                <div class="form-group">
                    <label for="alunos">Quantidade de Alunos:</label>
                    <input type="number" id="alunos" min="1" placeholder="Ex: 30">
                </div>
                <div class="form-group">
                    <label for="fotos">Fotos (Máximo 10):</label>
                    <input type="file" id="fotos" multiple accept="image/*" onchange="converterFotos(this)">
                </div>
            </div>

            <button type="submit" id="btnEnviar" class="hidden">Salvar Registro</button>
        </form>
    </div>

    <script src="config.js"></script>

    <script>
        // O código da página continua aqui...
        let dadosGlobais = {};
        // ...
        let fotosBase64 = [];
        let linhaAgendamentoAtual = null;

        window.onload = () => {
            fetch(URL_GAS)
                .then(res => res.json())
                .then(data => {
                    dadosGlobais = data;
                    
                    // Preenche o Select de Agendamentos Pendentes
                    const selectAg = document.getElementById("agendamentoSelect");
                    if (data.agendamentos && data.agendamentos.length > 0) {
                        data.agendamentos.forEach(ag => {
                            selectAg.innerHTML += `<option value="${ag.linha}">${ag.textoDisplay}</option>`;
                        });
                    } else {
                        selectAg.innerHTML = `<option value="">Nenhum agendamento pendente encontrado.</option>`;
                    }
                    
                    popularSelect("turno", data.turnos);
                    popularSelect("turma", data.turmas);
                    popularSelect("segmento", data.segmentos);

                    document.getElementById("status").style.display = "none";
                    document.getElementById("formOficina").style.display = "block";
                })
                .catch(err => {
                    document.getElementById("status").innerText = "Erro de conexão com o banco de dados.";
                    document.getElementById("status").style.color = "#dc2626";
                });
        };

        function popularSelect(id, array) {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Selecione...</option>';
            array.forEach(item => {
                select.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }

        // Função que roda ao escolher um agendamento na lista
        function preencherDadosAgendamento() {
            const linhaSelect = document.getElementById("agendamentoSelect").value;
            linhaAgendamentoAtual = linhaSelect;
            
            if (!linhaSelect) {
                document.getElementById("dadosBase").classList.add("hidden");
                document.getElementById("blocoRealizada").classList.add("hidden");
                document.getElementById("blocoCancelada").classList.add("hidden");
                document.getElementById("btnEnviar").classList.add("hidden");
                return;
            }

            // Acha os dados do agendamento escolhido
            const ag = dadosGlobais.agendamentos.find(a => a.linha == linhaSelect);
            
            // Preenche os campos readonly
            document.getElementById("dataOficina").value = ag.dataOficina;
            document.getElementById("local").value = ag.regional;
            document.getElementById("cidade").value = ag.cidade;
            document.getElementById("oficina").value = ag.oficina;
            document.getElementById("instituicao").value = ag.instituicao;

            // Filtra os instrutores baseados na regional do agendamento selecionado
            carregarInstrutores(ag.regional);

            // Mostra o bloco com os dados base e pergunta o status
            document.getElementById("dadosBase").classList.remove("hidden");
            
            // Reseta a escolha de status
            document.querySelectorAll('input[name="statusOficina"]').forEach(r => r.checked = false);
            alternarStatus(); 
        }

        // Carrega as checkboxes de instrutores
        function carregarInstrutores(regional) {
            const container = document.getElementById("instrutoresContainer");
            container.innerHTML = ""; 
            
            const instrutoresFiltrados = dadosGlobais.instrutoresData
                .filter(r => {
                    const regInstrutor = r[3] || "";
                    return regInstrutor === regional || (regional.includes("Governador") && regInstrutor.includes("Gov."));
                })
                .map(r => r[1]);
                
            instrutoresFiltrados.forEach(instrutor => {
                const label = document.createElement("label");
                label.className = "checkbox-label";
                label.innerHTML = `<input type="checkbox" name="instrutorCheck" value="${instrutor}"> ${instrutor}`;
                container.appendChild(label);
            });
        }

        // Controla o que aparece dependendo se clicar em Realizada ou Cancelada
        function alternarStatus() {
            const status = document.querySelector('input[name="statusOficina"]:checked')?.value;
            const blocoRealizada = document.getElementById("blocoRealizada");
            const blocoCancelada = document.getElementById("blocoCancelada");
            const btnEnviar = document.getElementById("btnEnviar");

            if (status === "Realizada") {
                blocoRealizada.classList.remove("hidden");
                blocoCancelada.classList.add("hidden");
                btnEnviar.classList.remove("hidden");
                btnEnviar.innerText = "Salvar Registro e Fotos";
                
                // Torna campos de realizada obrigatórios
                document.getElementById("turno").required = true;
                document.getElementById("turma").required = true;
                document.getElementById("segmento").required = true;
                document.getElementById("acompanhantes").required = true;
                document.getElementById("alunos").required = true;
                document.getElementById("motivoCancelamento").required = false;

            } else if (status === "Cancelada") {
                blocoRealizada.classList.add("hidden");
                blocoCancelada.classList.remove("hidden");
                btnEnviar.classList.remove("hidden");
                btnEnviar.innerText = "Registrar Cancelamento";

                // Torna motivo obrigatório e remove obrigatoriedade dos outros
                document.getElementById("turno").required = false;
                document.getElementById("turma").required = false;
                document.getElementById("segmento").required = false;
                document.getElementById("acompanhantes").required = false;
                document.getElementById("alunos").required = false;
                document.getElementById("motivoCancelamento").required = true;
            } else {
                blocoRealizada.classList.add("hidden");
                blocoCancelada.classList.add("hidden");
                btnEnviar.classList.add("hidden");
            }
        }

        function converterFotos(input) {
            fotosBase64 = [];
            if (input.files.length > 10) { alert("Limite excedido: no máximo 10 fotos."); input.value = ""; return; }
            
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotosBase64.push({ name: file.name, mimeType: file.type, base64: e.target.result.split(',')[1] });
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById("formOficina").onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnEnviar");
            const status = document.querySelector('input[name="statusOficina"]:checked').value;

            // Se realizada, validar os checkboxes de instrutores
            let instrutoresSelecionados = "";
            if (status === "Realizada") {
                const checkboxes = document.querySelectorAll('input[name="instrutorCheck"]:checked');
                if (checkboxes.length === 0) {
                    alert("Por favor, selecione pelo menos um instrutor presente.");
                    return; 
                }
                instrutoresSelecionados = Array.from(checkboxes).map(cb => cb.value).join(", ");
            }

            btn.innerText = "Salvando no sistema...";
            btn.disabled = true;

            const payload = {
                linhaAgendamento: linhaAgendamentoAtual,
                status: status,
                motivoCancelamento: document.getElementById("motivoCancelamento").value,
                
                // Dados base repassados para a aba Respostas
                dataDaOficina: document.getElementById("dataOficina").value,
                local: document.getElementById("local").value,
                cidade: document.getElementById("cidade").value,
                oficina: document.getElementById("oficina").value,
                instituicao: document.getElementById("instituicao").value,
                
                // Dados específicos da Realizada
                turno: document.getElementById("turno").value,
                turma: document.getElementById("turma").value,
                segmento: document.getElementById("segmento").value,
                acompanhantes: document.getElementById("acompanhantes").value,
                instrutores: instrutoresSelecionados,
                alunos: document.getElementById("alunos").value,
                fotos: fotosBase64
            };

            // Novo bloco de envio ajustado para ignorar o bloqueio CORS do Google
            fetch(URL_GAS, {
                method: "POST",
                mode: "no-cors", // <--- Esta é a linha mágica
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert(status === "Realizada" ? "Oficina registrada com sucesso!" : "Cancelamento registrado.");
                location.reload(); 
            })
            .catch(err => {
                alert("Erro de conexão com a internet.");
                console.error(err);
                btn.innerText = "Tentar Novamente";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
